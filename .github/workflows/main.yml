name: Run Proxmox Container

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  run-proxmox:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y tmate neofetch
      
      - name: Pull Proxmox Docker Image
        run: docker pull rtedpro/proxmox:9.0.11
      
      - name: Run Proxmox Container
        run: |
          docker run -itd \
            --name proxmoxve \
            --hostname pve \
            -p 8006:8006 \
            --privileged \
            rtedpro/proxmox:9.0.11
      
      - name: Wait for Proxmox to start
        run: sleep 30
      
      - name: Check Container Status
        run: |
          docker ps -a
          docker logs proxmoxve
      
      - name: Setup Pinggy Tunnel
        run: |
          echo "🌐 Starte Pinggy Tunnel..."
          ssh -p 443 -o StrictHostKeyChecking=no -o ServerAliveInterval=30 -R0:localhost:8006 tcp@free.pinggy.io &
          sleep 10
      
      - name: Display Proxmox Info
        run: |
          echo "✅ Proxmox Container gestartet!"
          echo "📦 Container Name: proxmoxve"
          echo "🔗 Lokale URL: http://localhost:8006"
          echo "🌍 Pinggy Tunnel aktiv - Check Logs für Public URL"
      
      - name: Keep alive (Optional - für Tests)
        run: sleep 3600
